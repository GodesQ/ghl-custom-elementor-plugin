name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Create the zip archive
      - name: Create zip archive
        run: |
          zip -r ghl-custom-plugin.zip .

      # 3. Set up SSH key from GitHub secret
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 4. Upload zip to cPanel server via SCP
      - name: Upload zip via SCP
        run: |
          scp -P ${{ secrets.SSH_PORT || '22' }} \
            ghl-custom-plugin.zip \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_PATH }}/ghl-custom-plugin.zip

      # 5. SSH into server and unzip into target directory
      - name: Unzip on server
        run: |
          ssh -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.REMOTE_PATH }} && \
             unzip -o ghl-custom-plugin.zip && \
             rm ghl-custom-plugin.zip"
