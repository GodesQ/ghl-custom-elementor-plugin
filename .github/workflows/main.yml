name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Create the zip archive
      - name: Create zip archive
        run: |
          zip -r ghl-custom-plugin.zip .

      # 3. Set up SSH key from GitHub secret
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 4. Upload zip to cPanel server via SCP
      - name: Upload zip via SCP
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          scp -P "$SSH_PORT" \
            ghl-custom-plugin.zip \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/ghl-custom-plugin.zip"

      # 5. SSH into server and unzip into target directory
      - name: Unzip on server
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'sh -s' -- "$REMOTE_PATH" <<'EOF'
            set -eu

            remote_path="$1"
            case "$remote_path" in
              "~") remote_path="$HOME" ;;
              "~/"*) remote_path="$HOME/${remote_path#~/}" ;;
            esac

            cd "$remote_path"

            unzip -o ghl-custom-plugin.zip
            rm -f ghl-custom-plugin.zip
          EOF
